name: CI + Docker Build & Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Print Trigger Info
        run: |
          echo "Workflow triggered!"
          echo "Event name: ${{ github.event_name }}"
          echo "Branch name: ${{ github.ref }}"
          echo "Repository: ${{ github.repository }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Node version before setup
        run: node -v || echo "Node not installed yet"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Confirm Node version
        run: node -v

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci

      - name: Build project
        run: |
          echo "Building project..."
          npm run build

      - name: Success message
        if: success()
        run: echo "CI completed successfully!"

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-app:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }} .

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }}